<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Clientes</title>
  <link rel="stylesheet" href="clientes.css">
</head>
<body>
  <h2>Registrar Cliente</h2>
  <form id="clienteForm">
    <input type="text" id="nombre" placeholder="Nombre" required>
    <input type="tel" id="telefono" placeholder="Teléfono" required>
    <input type="text" id="nemonico" placeholder="#nemonico">
    <input type="date" id="fecha" required>
    <button type="submit">Guardar</button>
    <button type="button" onclick="location.href='menu.html'">Volver al Menú Principal</button>
  </form>

  <!-- Pestañas -->
  <div class="tabs">
    <button onclick="mostrarTab('pedidos')">Pedidos Clientes</button>
    <button onclick="mostrarTab('fullcart')">Full Cart</button>
    <button onclick="mostrarTab('ventas')">Ventas Cerradas</button>
  </div>

  <!-- Contenido de pestañas -->
  <div id="tabPedidos" class="tab-content">
    <h2>Lista de Pedidos de Clientes</h2>
    <div class="counter">Total pedidos: <span id="contadorPedidos">0</span></div>
    <input type="text" id="buscadorPedidos" placeholder="Buscar pedido por nombre o ID">
    <ul id="listaPedidos"></ul>
  </div>

  <div id="tabFullCart" class="tab-content" style="display:none;">
    <h2>Lista de Carrito Lleno</h2>
    <div class="counter">Total en carrito: <span id="contadorFullCart">0</span></div>
    <input type="text" id="buscadorFullCart" placeholder="Buscar en carrito por nombre o etiqueta">
    <ul id="listaFullCart"></ul>
  </div>

  <div id="tabVentas" class="tab-content" style="display:none;">
    <h2>Lista de Ventas Cerradas</h2>
    <div class="counter">Total ventas cerradas: <span id="contadorVentas">0</span></div>
    <input type="text" id="buscadorVentas" placeholder="Buscar venta cerrada por nombre o etiqueta">
    <ul id="listaVentasCerradas"></ul>
  </div>

  <!-- Modal de credenciales -->
  <div id="modalCredenciales" style="display:none;">
    <div>
      <h3>Confirmar eliminación</h3>
      <input type="text" id="usuarioCheck" placeholder="Usuario"><br><br>
      <input type="password" id="passwordCheck" placeholder="Contraseña"><br><br>
      <button id="btnConfirmarEliminar">Confirmar</button>
      <button onclick="document.getElementById('modalCredenciales').style.display='none'">Cancelar</button>
    </div>
  </div>

  <!-- Modal de edición de cliente -->
  <div id="modalEditarCliente" style="display:none; position:fixed; top:0; left:0;
       width:100%; height:100%; background:rgba(0,0,0,0.5); text-align:center; padding-top:100px;">
    <div style="background:#fff; padding:20px; border-radius:10px; display:inline-block; border:2px solid #c0392b;">
      <h3 style="color:#c0392b;">Editar Cliente</h3>
      <form id="formEditarCliente">
        <input type="hidden" id="editarId">
        <input type="text" id="editarNombre" placeholder="Nombre" required><br><br>
        <input type="tel" id="editarTelefono" placeholder="Teléfono" required><br><br>
        <input type="text" id="editarNemonico" placeholder="#nemonico"><br><br>
        <input type="date" id="editarFecha" required><br><br>
        <button type="submit">Guardar cambios</button>
        <button type="button" onclick="document.getElementById('modalEditarCliente').style.display='none'">Cancelar</button>
      </form>
    </div>
  </div>

  <!-- 🔹 Cargar la lógica desde clientes.js -->
  <script type="module" src="clientes.js"></script>
</body>
</html>
