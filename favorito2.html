<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Favoritos - Glowzza</title>

  <!-- Fuentes y estilos -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans&display=swap">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="index2.css">
</head>
<body>

  <!-- 🔹 Header -->
  <header class="header">
    <div class="top-bar">
      <div class="social-icons">
        <a href="https://facebook.com" target="_blank"><span class="material-icons">facebook</span></a>
        <a href="https://instagram.com" target="_blank"><span class="material-icons">photo_camera</span></a>
        <a href="https://wa.me/541171019084" target="_blank"><span class="material-icons">chat</span></a>
      </div>
      <div class="buscador">
        <input type="text" id="buscador" placeholder="Buscar favoritos..." />
      </div>
      <div class="acciones">
        <button onclick="window.location.href='index2.html'" class="btn-principal">
          <span class="material-icons">home</span> Inicio
        </button>
        <button onclick="window.location.href='carrito2.html'" class="btn-secundario">
          <span class="material-icons">shopping_cart</span> Carrito
        </button>
      </div>
    </div>
  </header>

  <!-- 🔹 Cartel Glowzza Favoritos -->
  <div class="hero-favoritos">
    <h1>Mis Favoritos ✨</h1>
    <p>Productos que elegiste para tener siempre a mano</p>
  </div>

  <!-- 🔹 Sección Favoritos -->
  <section id="favoritos">
    <div class="productos" id="listaFavoritos"></div>
  </section>

  <!-- 🔹 Footer -->
  <footer>
    <div class="social-icons">
      <a href="https://facebook.com" target="_blank"><span class="material-icons">facebook</span></a>
      <a href="https://instagram.com" target="_blank"><span class="material-icons">photo_camera</span></a>
      <a href="https://wa.me/541171019084" target="_blank"><span class="material-icons">chat</span></a>
    </div>
    <p>© 2026 - Glowzza</p>
  </footer>

  <!-- 🔹 Scripts -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const contenedor = document.getElementById("listaFavoritos");
      let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

      if (favoritos.length === 0) {
        contenedor.innerHTML = "<p>No tienes productos en favoritos.</p>";
        return;
      }

      renderFavoritos(favoritos);

      // Buscador dinámico
      const buscador = document.getElementById("buscador");
      buscador.addEventListener("input", () => {
        const filtro = buscador.value.toLowerCase();
        document.querySelectorAll(".producto").forEach(prod => {
          const nombre = prod.querySelector("h4").textContent.toLowerCase();
          prod.style.display = nombre.includes(filtro) ? "block" : "none";
        });
      });
    });

    // 🔹 Renderizar favoritos
    function renderFavoritos(favoritos) {
      const contenedor = document.getElementById("listaFavoritos");
      contenedor.innerHTML = "";
      favoritos.forEach((prod, index) => {
        const div = document.createElement("div");
        div.classList.add("producto");
        div.innerHTML = `
          <div class="img-wrapper">
            <img src="${prod.imagen}" alt="${prod.nombre}">
          </div>
          <h4>${prod.nombre}</h4>
          <p>$${prod.precio}</p>
          <button class="btn-secundario" onclick="eliminarFavorito(${index})">Eliminar</button>
          <button class="btn-principal" onclick="agregarAlCarrito('${prod.nombre}', ${prod.precio}, '${prod.imagen}', ${index})">Agregar al carrito</button>
        `;
        contenedor.appendChild(div);
      });
    }

    // 🔹 Eliminar favorito sin recargar toda la página
    function eliminarFavorito(index) {
      let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];
      favoritos.splice(index, 1);
      localStorage.setItem("favoritos", JSON.stringify(favoritos));
      renderFavoritos(favoritos);
    }

    // 🔹 Agregar al carrito y eliminar de favoritos
    function agregarAlCarrito(nombre, precio, imagen, index) {
      let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

      const existente = carrito.find(p => p.nombre === nombre);
      if (existente) {
        existente.cantidad++;
      } else {
        carrito.push({ nombre, precio, imagen, cantidad: 1 });
      }
      localStorage.setItem("carrito", JSON.stringify(carrito));

      // Eliminar de favoritos
      favoritos.splice(index, 1);
      localStorage.setItem("favoritos", JSON.stringify(favoritos));
      renderFavoritos(favoritos);

      Swal.fire({
        icon: 'success',
        title: `${nombre} agregado al carrito`,
        showConfirmButton: false,
        timer: 1500
      });
    }
  </script>
    <!-- Cartel flotante -->
  <div class="promo-float" onclick="window.location.href='promociones2.html'">
    🔥 Promos
  </div>

</body>
</html>
