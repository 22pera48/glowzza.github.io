<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados del Scraper</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { margin-top: 30px; }
    .producto {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px 0;
      display: flex;
      align-items: center;
    }
    .producto img {
      max-width: 120px;
      margin-right: 15px;
    }
    .info {
      flex: 1;
    }
  </style>
</head>
<body>
  <h1>Catálogo Belleza Armonica</h1>
  <button onclick="refreshProductos()">🔄 Refresh</button>

  <div id="resultado"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    // ⚠️ Configuración de tu proyecto Firebase
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_DOMINIO.firebaseapp.com",
      projectId: "TU_PROJECT_ID",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function refreshProductos() {
      const resultadoDiv = document.getElementById("resultado");
      resultadoDiv.innerHTML = "⏳ Cargando productos desde Firebase...";

      const querySnapshot = await getDocs(collection(db, "productos"));
      const productos = [];
      querySnapshot.forEach(doc => productos.push(doc.data()));

      resultadoDiv.innerHTML = "";

      // Mostrar bajo el título fijo "Belleza Armonica"
      const titulo = document.createElement("h2");
      titulo.textContent = "🛍️ Belleza Armonica";
      resultadoDiv.appendChild(titulo);

      productos.forEach(prod => {
        const div = document.createElement("div");
        div.className = "producto";
        div.innerHTML = `
          <img src="${prod.img}" alt="${prod.nombre}">
          <div class="info">
            <strong>${prod.nombre}</strong><br>
            Precio: ${prod.precio}
          </div>
        `;
        resultadoDiv.appendChild(div);
      });
    }

    // Exponer la función al botón
    window.refreshProductos = refreshProductos;
  </script>
</body>
</html>
