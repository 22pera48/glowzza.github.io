<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados del Scraper</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { margin-top: 30px; }
    .producto { 
      border: 1px solid #ccc; 
      padding: 10px; 
      margin: 10px 0; 
      display: flex; 
      align-items: center; 
    }
    .producto img { 
      max-width: 120px; 
      margin-right: 15px; 
    }
    .info { 
      flex: 1; 
    }
  </style>
</head>
<body>
  <h1>Control del Scraper</h1>
  <button onclick="ejecutarScraper()">Ejecutar scraper ahora</button>
  <button onclick="volverMenu()">Volver al menú</button>

  <div id="resultado"></div>

  <script>
    async function ejecutarScraper() {
      const resultadoDiv = document.getElementById("resultado");
      resultadoDiv.innerHTML = "⏳ Ejecutando scraper...";

      try {
        const res = await fetch("/ejecutar-scraper", { method: "POST" });
        const data = await res.json();

        resultadoDiv.innerHTML = `<h2>${data.mensaje}</h2>`;

        // Agrupar por tienda (ejemplo: producto.tienda)
        const grupos = {};
        data.productos.forEach(prod => {
          const tienda = prod.tienda || "Sin tienda";
          if (!grupos[tienda]) grupos[tienda] = [];
          grupos[tienda].push(prod);
        });

        // Mostrar cada grupo
        for (const tienda in grupos) {
          const titulo = document.createElement("h2");
          titulo.textContent = `🛍️ ${tienda}`;
          resultadoDiv.appendChild(titulo);

          grupos[tienda].forEach(prod => {
            const div = document.createElement("div");
            div.className = "producto";
            div.innerHTML = `
              <img src="${prod.img}" alt="${prod.nombre}">
              <div class="info">
                <strong>${prod.nombre}</strong><br>
                Precio: ${prod.precio || "N/A"}
              </div>
            `;
            resultadoDiv.appendChild(div);
          });
        }
      } catch (err) {
        resultadoDiv.innerHTML = "❌ Error al conectar con el servidor";
      }
    }

    function volverMenu() {
      window.location.href = "/menu.html"; 
    }
  </script>
</body>
</html>
