<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Carrito - Glowzza</title>

  <!-- Fuentes y estilos -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans&display=swap">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="index2.css">

  <style>
    /* Modal estilos */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
    }
    .modal-content {
      background: #fff;
      margin: 10% auto;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      text-align: center;
    }
    .close {
      float: right;
      font-size: 1.5rem;
      cursor: pointer;
    }
    #formCorreo label {
      display: block;
      margin-top: 10px;
      text-align: left;
    }
    #formCorreo input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

  <!-- 🔹 Header -->
  <header class="header">
    <div class="top-bar">
      <div class="social-icons">
        <a href="https://facebook.com" target="_blank"><span class="material-icons">facebook</span></a>
        <a href="https://instagram.com" target="_blank"><span class="material-icons">photo_camera</span></a>
        <a href="https://wa.me/541171019084" target="_blank"><span class="material-icons">chat</span></a>
      </div>
      <div class="acciones">
        <button onclick="window.location.href='index2.html'" class="btn-principal">
          <span class="material-icons">home</span> Inicio
        </button>
        <button onclick="window.location.href='favorito2.html'" class="btn-secundario">
          <span class="material-icons">favorite</span> Favoritos
        </button>
      </div>
    </div>
  </header>

  <!-- 🔹 Cartel Glowzza -->
  <div class="hero-carrito">
    <h1>Glowzza</h1>
    <p>✨ Tu carrito de belleza y cuidado personal ✨</p>
  </div>

  <!-- 🔹 Sección Carrito -->
  <section id="carrito">
    <h1>Mi Carrito</h1>
    <div class="cart-container">
      <!-- Tabla de productos -->
      <div id="contenedorCarrito" class="cart-products"></div>

      <!-- Resumen -->
      <div class="cart-summary">
        <h2>Total del carrito</h2>
        <div id="subtotalCarrito"></div>
        <div id="totalCarrito" class="total"></div>
        <button class="btn-finalizar" onclick="finalizarCompra()">Ir a finalizar la compra</button>
        <button class="btn-secundario" onclick="vaciarCarrito()">Vaciar carrito</button>
      </div>
    </div>
  </section>

  <!-- 🔹 Modal Finalizar Compra -->
  <div id="finalizarModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="cerrarModal()">&times;</span>
      <h2>¿Cómo querés finalizar tu compra?</h2>
      <button class="btn-principal" onclick="finalizarConWhatsApp()">Finalizar con WhatsApp</button>
      <button class="btn-secundario" onclick="mostrarFormulario()">Finalizar con Correo</button>

      <!-- Formulario oculto -->
      <form id="formCorreo" style="display:none; margin-top:20px;">
        <label>Nombre:</label>
        <input type="text" id="nombreCorreo" required>
        <label>Email:</label>
        <input type="email" id="emailCorreo" required>
        <label>Dirección:</label>
        <input type="text" id="direccionCorreo" required>
        <button type="submit" class="btn-principal">Enviar pedido</button>
      </form>
    </div>
  </div>

  <!-- 🔹 Footer -->
  <footer>
    <div class="social-icons">
      <a href="https://facebook.com" target="_blank"><span class="material-icons">facebook</span></a>
      <a href="https://instagram.com" target="_blank"><span class="material-icons">photo_camera</span></a>
      <a href="https://wa.me/541171019084" target="_blank"><span class="material-icons">chat</span></a>
    </div>
    <p>© 2026 - Glowzza</p>
  </footer>

  <!-- 🔹 Script -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const contenedor = document.getElementById("contenedorCarrito");
      const subtotalDiv = document.getElementById("subtotalCarrito");
      const totalDiv = document.getElementById("totalCarrito");
      let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

      if (carrito.length === 0) {
        contenedor.innerHTML = "<p>Tu carrito está vacío.</p>";
        subtotalDiv.textContent = "";
        totalDiv.textContent = "";
        return;
      }

      let subtotal = 0;
      contenedor.innerHTML = `
        <table class="tabla-carrito">
          <thead>
            <tr>
              <th>Imagen</th>
              <th>Producto</th>
              <th>Precio</th>
              <th>Cantidad</th>
              <th>Subtotal</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${carrito.map((item, index) => {
              const sub = item.precio * item.cantidad;
              subtotal += sub;
              return `
                <tr>
                  <td><img src="${item.imagen}" alt="${item.nombre}" class="img-carrito"></td>
                  <td>${item.nombre}</td>
                  <td>$${item.precio}</td>
                  <td>
                    <input type="number" min="1" value="${item.cantidad}" onchange="actualizarCantidad(${index}, this.value)">
                  </td>
                  <td>$${sub}</td>
                  <td><button class="btn-secundario" onclick="eliminarProducto(${index})">Eliminar</button></td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
      subtotalDiv.textContent = `Subtotal: $${subtotal}`;
      totalDiv.textContent = `Total: $${subtotal}`;
    });

    function actualizarCantidad(index, nuevaCantidad) {
      let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      carrito[index].cantidad = parseInt(nuevaCantidad);
      localStorage.setItem("carrito", JSON.stringify(carrito));
      location.reload();
    }

    function eliminarProducto(index) {
      let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      carrito.splice(index, 1);
      localStorage.setItem("carrito", JSON.stringify(carrito));
      location.reload();
    }

    function vaciarCarrito() {
      localStorage.removeItem("carrito");
      location.reload();
    }

    // Abrir modal
    function finalizarCompra() {
      document.getElementById("finalizarModal").style.display = "block";
    }

    // Cerrar modal
    function cerrarModal() {
      document.getElementById("finalizarModal").style.display = "none";
    }

    // Finalizar con WhatsApp
    function finalizarConWhatsApp() {
      let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      let mensaje = "🛒 Hola, quiero finalizar mi compra:\n";
      let total = 0;
      carrito.forEach(item => {
        let sub = item.precio * item.cantidad;
        total += sub;
        mensaje += `• ${item.nombre} x${item.cantidad} = $${sub}\n`;
      });
      mensaje += `\n💰 Total: $${total}\nGracias por elegir Glowzza 💖`;
      let url = `https://wa.me/541171019084?text=${encodeURIComponent(mensaje)}`;
      window.open(url, "_blank");
    }

    // Mostrar formulario correo
    function mostrarFormulario() {
      document.getElementById("formCorreo").style.display = "block";
    }

    // Enviar formulario correo
    document.getElementById("formCorreo").addEventListener("submit", (e) => {
      e.preventDefault();

      // Capturar datos del formulario
      const nombre = document.getElementById("nombreCorreo").value;
      const email = document.getElementById("emailCorreo").value;
      const direccion = document.getElementById("direccionCorreo").value;

      // Podés armar el mensaje con los datos y el carrito
      let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      let resumen = "🛒 Pedido vía correo:\n";
      let total = 0;
      carrito.forEach(item => {
        let sub = item.precio * item.cantidad;
        total += sub;
        resumen += `• ${item.nombre} x${item.cantidad} = $${sub}\n`;
      });
      resumen += `\n💰 Total: $${total}\nCliente: ${nombre}\nEmail: ${email}\nDirección: ${direccion}`;

      // Simulación de envío
      Swal.fire({
        icon: 'success',
        title: 'Pedido enviado por correo',
        text: 'Gracias por elegir Glowzza 💖',
        timer: 2500,
        showConfirmButton: false
      });

      // Limpiar carrito y cerrar modal
      localStorage.removeItem("carrito");
      cerrarModal();
      setTimeout(() => location.href = "index2.html", 2500);
    });
  </script>
</body>
</html>
