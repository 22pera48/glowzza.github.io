<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Carrito - Glowzza</title>

  <!-- Fuentes y estilos -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans&display=swap">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="index2.css">
</head>
<body>

  <!-- 🔹 Header -->
  <header class="header">
    <div class="top-bar">
      <div class="social-icons">
        <a href="https://facebook.com" target="_blank"><span class="material-icons">facebook</span></a>
        <a href="https://instagram.com" target="_blank"><span class="material-icons">photo_camera</span></a>
        <a href="https://wa.me/541171019084" target="_blank"><span class="material-icons">chat</span></a>
      </div>
      <div class="acciones">
        <button onclick="window.location.href='index2.html'" class="btn-principal">
          <span class="material-icons">home</span> Inicio
        </button>
        <button onclick="window.location.href='favorito2.html'" class="btn-secundario">
          <span class="material-icons">favorite</span> Favoritos
        </button>
      </div>
    </div>
  </header>

  <!-- 🔹 Sección Carrito -->
  <section id="carrito">
    <h1>Mi Carrito</h1>
    <div class="cart-container">
      <!-- Tabla de productos -->
      <div id="contenedorCarrito" class="cart-products"></div>

      <!-- Resumen -->
      <div class="cart-summary">
        <h2>Total del carrito</h2>
        <div id="subtotalCarrito"></div>
        <div id="totalCarrito" class="total"></div>
        <button class="btn-finalizar" onclick="finalizarCompra()">Ir a finalizar la compra</button>
        <button class="btn-secundario" onclick="vaciarCarrito()">Vaciar carrito</button>
      </div>
    </div>
  </section>

  <!-- 🔹 Footer -->
  <footer>
    <div class="social-icons">
      <a href="https://facebook.com" target="_blank"><span class="material-icons">facebook</span></a>
      <a href="https://instagram.com" target="_blank"><span class="material-icons">photo_camera</span></a>
      <a href="https://wa.me/541171019084" target="_blank"><span class="material-icons">chat</span></a>
    </div>
    <p>© 2026 - Glowzza</p>
  </footer>

  <!-- 🔹 Script -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const contenedor = document.getElementById("contenedorCarrito");
      const subtotalDiv = document.getElementById("subtotalCarrito");
      const totalDiv = document.getElementById("totalCarrito");
      let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

      if (carrito.length === 0) {
        contenedor.innerHTML = "<p>Tu carrito está vacío.</p>";
        subtotalDiv.textContent = "";
        totalDiv.textContent = "";
        return;
      }

      let subtotal = 0;
      contenedor.innerHTML = `
        <table class="tabla-carrito">
          <thead>
            <tr>
              <th>Imagen</th>
              <th>Producto</th>
              <th>Precio</th>
              <th>Cantidad</th>
              <th>Subtotal</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${carrito.map((item, index) => {
              const sub = item.precio * item.cantidad;
              subtotal += sub;
              return `
                <tr>
                  <td><img src="${item.imagen}" alt="${item.nombre}" class="img-carrito"></td>
                  <td>${item.nombre}</td>
                  <td>$${item.precio}</td>
                  <td>
                    <input type="number" min="1" value="${item.cantidad}" onchange="actualizarCantidad(${index}, this.value)">
                  </td>
                  <td>$${sub}</td>
                  <td><button class="btn-secundario" onclick="eliminarProducto(${index})">Eliminar</button></td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
      subtotalDiv.textContent = `Subtotal: $${subtotal}`;
      totalDiv.textContent = `Total: $${subtotal}`;
    });

    function actualizarCantidad(index, nuevaCantidad) {
      let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      carrito[index].cantidad = parseInt(nuevaCantidad);
      localStorage.setItem("carrito", JSON.stringify(carrito));
      location.reload();
    }

    function eliminarProducto(index) {
      let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
      carrito.splice(index, 1);
      localStorage.setItem("carrito", JSON.stringify(carrito));
      location.reload();
    }

    function vaciarCarrito() {
      localStorage.removeItem("carrito");
      location.reload();
    }

    function finalizarCompra() {
      Swal.fire({
        icon: 'success',
        title: '¡Compra finalizada!',
        text: 'Gracias por elegir Glowzza 💖',
        timer: 2000,
        showConfirmButton: false
      });
      localStorage.removeItem("carrito");
      setTimeout(() => location.href = "index2.html", 2000);
    }
  </script>
</body>
</html>
